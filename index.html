<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halima Kitchen - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Narnoor:wght@400;500;600;700;800&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-dark: #4b2c20;
            --brand-gold: #d97706;
            --brand-cream: #fdf5e6;
        }
        
        body {
            font-family: "Narnoor", sans-serif;
            font-weight: 400;
            font-style: normal;
            background-color: var(--brand-cream);
            color: var(--brand-dark);
            transition: direction 0.3s ease;
        }
        
        [dir="rtl"] * {
            font-family: "Rubik", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }

        .brand-title {
            font-family: "Narnoor", sans-serif;
            font-weight: 800;
        }
        
        [dir="rtl"] .brand-title,
        [dir="rtl"] h2,
        [dir="rtl"] h3 {
            font-weight: 700;
        }
        
        .layered-shadow {
            box-shadow: 6px 6px 0px var(--brand-gold);
            transition: all 0.2s ease;
        }
        .layered-shadow:active {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0px var(--brand-gold);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        [dir="rtl"] .text-left { text-align: right; }
        [dir="rtl"] .text-right { text-align: left; }

        .lang-btn {
            font-weight: 600;
        }
    </style>
</head>
<body class="min-h-screen pb-32 md:pb-10" dir="ltr">

    <!-- Language Selector Floating -->
    <div class="fixed top-4 right-4 z-[100] bg-white p-1 rounded-full layered-shadow border border-brand-dark flex gap-1">
        <button onclick="toggleLanguage('en')" data-lang="en" class="lang-btn px-4 py-1 rounded-full text-xs transition-all">EN</button>
        <button onclick="toggleLanguage('ar')" data-lang="ar" class="lang-btn px-4 py-1 rounded-full text-xs transition-all">AR</button>
    </div>

    <!-- Header Section -->
    <header class="py-8 px-4 text-center">
        <div class="flex justify-center mb-4">
            <svg class="w-16 h-16" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 50C20 30 35 25 50 25C65 25 80 30 80 50V60H20V50Z" fill="#d97706"/>
                <path d="M15 60H85L80 75H20L15 60Z" fill="#4b2c20"/>
                <path d="M45 15C45 15 48 10 50 10C52 10 55 15 55 15" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h1 class="brand-title text-3xl md:text-5xl mb-1">Halima kitchen</h1>
        <p class="text-brand-gold font-semibold tracking-[0.2em] text-xs md:text-sm uppercase" id="brand-tagline">JUST LIKE MAMA MADE</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Menu Items Column -->
        <div class="lg:col-span-2 space-y-10">
            <div id="menu-content"></div>
        </div>

        <!-- Desktop Estimator Sidebar -->
        <aside class="hidden lg:block">
            <div class="bg-white p-6 rounded-lg sticky top-8 layered-shadow border-2 border-[#4b2c20]">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold" id="label-estimator-title"></h2>
                    <button onclick="resetCart()" class="text-xs text-red-600 font-bold uppercase hover:underline" id="label-clear-desktop"></button>
                </div>
                <div id="cart-items" class="space-y-4 mb-4 max-h-[50vh] overflow-y-auto no-scrollbar"></div>
                <div class="border-t pt-4">
                    <div class="flex justify-between font-bold text-xl">
                        <span id="label-grand-total-desktop"></span>
                        <span id="desktop-total" class="text-brand-gold">0.00 JOD</span>
                    </div>
                </div>
            </div>
        </aside>

    </main>

    <!-- Mobile Floating UI -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 p-4 z-50">
        <div class="bg-[#4b2c20] text-white p-4 rounded-xl layered-shadow flex justify-between items-center">
            <div>
                <p class="text-[10px] uppercase tracking-wider text-gray-300" id="label-estimated-mobile"></p>
                <p class="text-2xl font-bold"><span id="mobile-total">0.00</span> <span class="text-sm font-normal" id="mobile-currency">JOD</span></p>
            </div>
            <button onclick="resetCart()" class="text-xs border border-white/30 px-3 py-1 rounded uppercase tracking-widest font-bold" id="label-clear-mobile"></button>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let cart = {};

        const uiLabels = {
            tagline: { en: "JUST LIKE MAMA MADE", ar: "كما تصنعه الأم تماماً" },
            estimatorTitle: { en: "Total Estimator", ar: "حساب التكلفة" },
            grandTotal: { en: "Grand Total", ar: "المجموع الكلي" },
            noItems: { en: "No items selected", ar: "لا يوجد أطباق مختارة" },
            clearAll: { en: "Clear All", ar: "مسح الكل" },
            quantity: { en: "Quantity", ar: "الكمية" },
            currency: { en: "JOD", ar: "د.أ" }
        };

        const menuData = [
            {
                title: { en: "Main Dishes", ar: "الأطباق الرئيسية" },
                products: [
                    { id: 1, name: { en: "Traditional Mansaf", ar: "منسف تقليدي" }, desc: { en: "Classic lamb with jameed sauce", ar: "لحم بالجميد الأصلي" }, price: 12.50 },
                    { id: 2, name: { en: "Chicken Musakhan", ar: "مسخن دجاج" }, desc: { en: "Roasted with sumac and onions", ar: "دجاج محمر بالسماق والبصل" }, price: 9.00 },
                    { id: 3, name: { en: "Maqluba", ar: "مقلوبة" }, desc: { en: "Upside-down rice with eggplant", ar: "أرز بالباذنجان واللحم" }, price: 11.00 }
                ]
            },
            {
                title: { en: "Appetizers", ar: "المقبلات" },
                products: [
                    { id: 4, name: { en: "Hummus", ar: "حمص" }, desc: { en: "Creamy tahini chickpeas", ar: "حمص بالطحينة والليمون" }, price: 4.50 },
                    { id: 5, name: { en: "Tabbouleh", ar: "تبولة" }, desc: { en: "Fresh parsley salad", ar: "سلطة بقدونس طازجة" }, price: 5.00 }
                ]
            }
        ];

        function persistData() {
            localStorage.setItem('halima_cart', JSON.stringify(cart));
            localStorage.setItem('halima_lang', currentLang);
        }

        function loadSavedData() {
            const savedCart = localStorage.getItem('halima_cart');
            const savedLang = localStorage.getItem('halima_lang');
            
            if (savedCart) {
                try {
                    cart = JSON.parse(savedCart);
                } catch (e) {
                    cart = {};
                }
            }
            if (savedLang) currentLang = savedLang;
        }

        function toggleLanguage(lang) {
            currentLang = lang;
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.dataset.lang === lang;
                btn.classList.toggle('bg-[#d97706]', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('text-brand-dark', !isActive);
            });

            persistData();
            initUI();
        }

        function initUI() {
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            // Sync buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isActive = btn.dataset.lang === currentLang;
                btn.classList.toggle('bg-[#d97706]', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('text-brand-dark', !isActive);
            });

            document.getElementById('brand-tagline').innerText = uiLabels.tagline[currentLang];
            document.getElementById('label-estimator-title').innerText = uiLabels.estimatorTitle[currentLang];
            document.getElementById('label-clear-desktop').innerText = uiLabels.clearAll[currentLang];
            document.getElementById('label-clear-mobile').innerText = uiLabels.clearAll[currentLang];
            document.getElementById('label-grand-total-desktop').innerText = uiLabels.grandTotal[currentLang];
            document.getElementById('label-estimated-mobile').innerText = uiLabels.grandTotal[currentLang];
            document.getElementById('mobile-currency').innerText = uiLabels.currency[currentLang];
            
            renderMenu();
            updateCartSummary();
        }

        function renderMenu() {
            const menuContent = document.getElementById('menu-content');
            menuContent.innerHTML = menuData.map(cat => `
                <div class="mb-10">
                    <div class="flex items-center gap-4 mb-6">
                        <h2 class="text-2xl font-bold whitespace-nowrap">${cat.title[currentLang]}</h2>
                        <div class="h-[2px] w-full bg-orange-200"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${cat.products.map(item => `
                            <div class="bg-[#4b2c20] text-white p-5 rounded-md layered-shadow flex flex-col justify-between h-full">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="flex-1 text-left">
                                        <h3 class="font-bold text-lg leading-tight">${item.name[currentLang]}</h3>
                                        <p class="text-xs text-gray-400 mt-1 italic">${item.desc[currentLang]}</p>
                                    </div>
                                    <span class="bg-[#d97706] px-2 py-1 rounded text-sm font-bold shrink-0">${item.price.toFixed(2)} ${uiLabels.currency[currentLang]}</span>
                                </div>
                                
                                <div class="flex items-center justify-between mt-2 pt-4 border-t border-white/10">
                                    <span class="text-xs text-gray-300 uppercase tracking-widest font-bold">${uiLabels.quantity[currentLang]}</span>
                                    <div class="flex items-center bg-white/10 rounded overflow-hidden">
                                        <button onclick="updateQty(${item.id}, -1)" class="px-3 py-1 hover:bg-[#d97706] transition-colors">-</button>
                                        <span id="qty-${item.id}" class="px-4 py-1 font-bold min-w-[3rem] text-center">${cart[item.id] || 0}</span>
                                        <button onclick="updateQty(${item.id}, 1)" class="px-3 py-1 hover:bg-[#d97706] transition-colors">+</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, delta) {
            const current = cart[id] || 0;
            const next = current + delta;
            if (next <= 0) delete cart[id];
            else cart[id] = next;
            
            const qtyLabel = document.getElementById(`qty-${id}`);
            if (qtyLabel) qtyLabel.innerText = cart[id] || 0;
            
            persistData();
            updateCartSummary();
        }

        function updateCartSummary() {
            let total = 0;
            const cartItemsContainer = document.getElementById('cart-items');
            const itemsHtml = [];
            const allProducts = menuData.flatMap(c => c.products);

            for (const [id, qty] of Object.entries(cart)) {
                const product = allProducts.find(p => p.id == id);
                if (product) {
                    const itemTotal = product.price * qty;
                    total += itemTotal;
                    itemsHtml.push(`
                        <div class="flex justify-between items-start text-sm bg-gray-50 p-2 rounded border-brand-gold ${currentLang === 'ar' ? 'border-r-4' : 'border-l-4'}">
                            <div class="text-left">
                                <p class="font-bold">${product.name[currentLang]}</p>
                                <p class="text-xs text-[#d97706] font-semibold mt-1">${qty} x ${product.price.toFixed(2)} ${uiLabels.currency[currentLang]}</p>
                            </div>
                            <div class="text-right">
                                <span class="font-bold">${itemTotal.toFixed(2)} ${uiLabels.currency[currentLang]}</span>
                            </div>
                        </div>
                    `);
                }
            }

            cartItemsContainer.innerHTML = itemsHtml.length > 0 ? itemsHtml.join('') : `<p class="text-gray-400 text-sm italic text-center py-4">${uiLabels.noItems[currentLang]}</p>`;
            document.getElementById('mobile-total').innerText = total.toFixed(2);
            document.getElementById('desktop-total').innerText = `${total.toFixed(2)} ${uiLabels.currency[currentLang]}`;
        }

        function resetCart() {
            cart = {};
            persistData();
            renderMenu();
            updateCartSummary();
        }

        window.onload = () => {
            loadSavedData();
            initUI();
        };
    </script>
</body>
</html>
